name: UI Build Test

on:
  push:
    paths:
      - "ui/**"
  pull_request:
    paths:
      - "ui/**"

jobs:
  ui-build-test:
    name: Test bun build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install and build
        working-directory: ui
        run: |
          bun install --frozen-lockfile
          bun --bun vite build
