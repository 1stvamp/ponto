name: UI Build Test

on:
  push:
    paths:
      - "ui/**"
  pull_request:
    paths:
      - "ui/**"

jobs:
  ui-build-test:
    name: Test npm build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        working-directory: ui
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
        run: |
          npm install
          npm run build
